<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareConnect Redirect</title>
    <script>
      (function redirectGithubPagesRoute() {
        const repoBase = "/Team4";
        const pathname = window.location.pathname;
        const routePath = pathname.startsWith(repoBase)
          ? pathname.slice(repoBase.length) || "/"
          : pathname;
        const redirectPath = `${repoBase}${routePath}${window.location.search}${window.location.hash}`;

        sessionStorage.setItem("gh-pages-path", redirectPath);
        window.location.replace(`${repoBase}/`);
      })();
    </script>
  </head>
  <body></body>
</html>
